<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" role="img" aria-label="B-Advice Project &amp; Wastemanagement">
  <!-- Green circle background -->
  <circle cx="30" cy="30" r="28" fill="#2E7D52"/>

  <!-- White plant/hands design inside circle -->
  <!-- Left curved arm/hand -->
  <path d="M13 42 C10 34 14 24 21 26 C20 30 20 34 28 36"
        fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Right curved arm/hand -->
  <path d="M47 42 C50 34 46 24 39 26 C40 30 40 34 32 36"
        fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Center stem -->
  <line x1="30" y1="36" x2="30" y2="18"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M30 26 C24 22 17 26 18 32"
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Right leaf -->
  <path d="M30 26 C36 22 43 26 42 32"
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Top bud -->
  <circle cx="30" cy="15" r="4.5" fill="white"/>

  <!-- B-ADVICE bold text - white for dark backgrounds (navbar/footer) -->
  <text x="70" y="27"
        font-family="Arial, Helvetica, sans-serif"
        font-size="19"
        font-weight="900"
        fill="white"
        letter-spacing="0.8">B-ADVICE</text>

  <!-- Subtitle text -->
  <text x="71" y="43"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10"
        fill="rgba(255,255,255,0.65)"
        letter-spacing="0.4">Project &amp; Wastemanagement</text>
</svg>
