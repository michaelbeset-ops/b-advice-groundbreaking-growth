<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>B-Advice</title>
  <script type="text/javascript">
    // GitHub Pages SPA-redirect: stuurt 404 terug naar index.html
    // zodat React Router de URL correct kan verwerken.
    // Zie: https://github.com/rafgraph/spa-github-pages
    var segmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
